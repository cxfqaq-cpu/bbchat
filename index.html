<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>bbchat - 登录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-bg"></div>
    <div class="login-card">
      <img src="assets/logo.png" alt="Logo" class="login-logo">
      <h1 class="login-title">bbchat</h1>
      <p class="login-subtitle">连接校园，畅聊每一刻</p>
      <input type="text" id="username" class="soft-input login-input" placeholder="账号" autocomplete="username">
      <input type="password" id="password" class="soft-input login-input" placeholder="密码" autocomplete="current-password">
      <button type="button" id="loginBtn" class="login-btn pressable">登 录</button>
      <p id="loginError" class="login-error"></p>
      <div class="login-footer">
        <a id="registerLink">注册</a>
        <a id="forgotLink">忘记密码</a>
      </div>
    </div>
  </div>

  <div id="registerModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 class="modal-title">注册 bbchat 账号</h2>
      <input type="text" id="regId" class="soft-input login-input" placeholder="账号（字母开头，3-20位英文/数字）" autocomplete="username">
      <input type="text" id="regNickname" class="soft-input login-input" placeholder="昵称（可选）">
      <input type="password" id="regPassword" class="soft-input login-input" placeholder="密码（至少 6 位）" autocomplete="new-password">
      <input type="password" id="regPassword2" class="soft-input login-input" placeholder="确认密码" autocomplete="new-password">
      <p id="regError" class="login-error"></p>
      <div class="modal-actions">
        <button type="button" id="regCancel" class="modal-btn modal-btn-secondary pressable">取消</button>
        <button type="button" id="regConfirm" class="modal-btn modal-btn-primary pressable">完成注册</button>
      </div>
    </div>
  </div>

  <div id="forgotModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 class="modal-title">重置密码</h2>
      <input type="text" id="forgotId" class="soft-input login-input" placeholder="账号">
      <input type="password" id="forgotPassword" class="soft-input login-input" placeholder="新密码（至少 6 位）">
      <input type="password" id="forgotPassword2" class="soft-input login-input" placeholder="确认新密码">
      <p id="forgotError" class="login-error"></p>
      <div class="modal-actions">
        <button type="button" id="forgotCancel" class="modal-btn modal-btn-secondary pressable">取消</button>
        <button type="button" id="forgotConfirm" class="modal-btn modal-btn-primary pressable">确认</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    (async () => {
      try { await ensureDemoAccount(); } catch (_) {}

      const usernameEl = document.getElementById('username');
      const passwordEl = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');

      async function doLogin() {
        const login = usernameEl.value.trim();
        const pwd = passwordEl.value;
        if (!login || !pwd) { loginError.textContent = '请输入账号和密码'; return; }
        loginBtn.disabled = true;
        loginBtn.textContent = '登录中...';
        try {
          const result = await loginUser(login, pwd);
          if (result.ok) window.location.href = 'app.html';
          else loginError.textContent = result.error || '登录失败';
        } catch (e) {
          loginError.textContent = '无法连接服务器，请稍后重试';
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = '登 录';
        }
      }

      loginBtn.addEventListener('click', doLogin);
      passwordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

      const registerModal = document.getElementById('registerModal');
      document.getElementById('registerLink').addEventListener('click', () => {
        registerModal.classList.remove('hidden');
        document.getElementById('regError').textContent = '';
        document.getElementById('regId').value = '';
        document.getElementById('regNickname').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regPassword2').value = '';
      });
      document.getElementById('regCancel').addEventListener('click', () => registerModal.classList.add('hidden'));

      document.getElementById('regConfirm').addEventListener('click', async () => {
        const id = document.getElementById('regId').value.trim();
        const nickname = document.getElementById('regNickname').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const pwd2 = document.getElementById('regPassword2').value;
        const errEl = document.getElementById('regError');
        if (!id || !pwd) { errEl.textContent = '请填写账号和密码'; return; }
        if (!/^[a-zA-Z][a-zA-Z0-9]{2,19}$/.test(id)) {
          errEl.textContent = '账号须字母开头，3-20位英文或数字，不能含特殊符号';
          return;
        }
        if (pwd.length < 6) { errEl.textContent = '密码至少 6 位'; return; }
        if (pwd !== pwd2) { errEl.textContent = '两次密码不一致'; return; }
        try {
          const result = await registerUser({ id, password: pwd, nickname: nickname || id });
          if (result.ok) {
            registerModal.classList.add('hidden');
            usernameEl.value = result.userId || id.toLowerCase();
            passwordEl.value = pwd;
            loginError.textContent = '注册成功，请登录';
          } else errEl.textContent = result.error;
        } catch (_) { errEl.textContent = '无法连接服务器'; }
      });

      const forgotModal = document.getElementById('forgotModal');
      document.getElementById('forgotLink').addEventListener('click', () => {
        forgotModal.classList.remove('hidden');
        document.getElementById('forgotError').textContent = '';
      });
      document.getElementById('forgotCancel').addEventListener('click', () => forgotModal.classList.add('hidden'));
      document.getElementById('forgotConfirm').addEventListener('click', async () => {
        const id = document.getElementById('forgotId').value.trim();
        const pwd = document.getElementById('forgotPassword').value;
        const pwd2 = document.getElementById('forgotPassword2').value;
        const errEl = document.getElementById('forgotError');
        if (!id || !pwd) { errEl.textContent = '请填写完整信息'; return; }
        if (pwd.length < 6) { errEl.textContent = '密码至少 6 位'; return; }
        if (pwd !== pwd2) { errEl.textContent = '两次密码不一致'; return; }
        try {
          const result = await resetPassword(id, pwd);
          if (result.ok) {
            forgotModal.classList.add('hidden');
            usernameEl.value = id;
            loginError.textContent = '密码已重置，请登录';
          } else errEl.textContent = result.error;
        } catch (_) { errEl.textContent = '无法连接服务器'; }
      });
    })();
  </script>
</body>
</html>
