<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>bbchat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
</head>
<body class="auth-body">
  <div class="login-page">
    <div class="login-bg" aria-hidden="true">
      <div class="login-bg-grid"></div>
      <div class="login-bg-orb login-bg-orb-a"></div>
      <div class="login-bg-orb login-bg-orb-b"></div>
    </div>

    <main class="login-shell">
      <div class="auth-lang-bar">
        <button type="button" class="auth-lang-btn active" data-lang="zh">中文</button>
        <button type="button" class="auth-lang-btn" data-lang="en">EN</button>
        <button type="button" class="auth-lang-btn" data-lang="vi">VI</button>
      </div>

      <section class="login-brand">
        <img src="assets/logo.svg" alt="bbchat" class="login-logo">
        <h1 class="login-title">bbchat</h1>
        <p class="login-subtitle" data-auth="subtitle">连接校园，畅聊每一刻</p>
      </section>

      <section class="login-card">
        <label class="field-label" for="username" data-auth="account">账号</label>
        <input type="text" id="username" class="soft-input login-input" data-auth-ph="accountPh" placeholder="请输入账号" autocomplete="username">
        <label class="field-label" for="password" data-auth="password">密码</label>
        <input type="password" id="password" class="soft-input login-input" data-auth-ph="passwordPh" placeholder="请输入密码" autocomplete="current-password">
        <button type="button" id="loginBtn" class="login-btn pressable" data-auth="signIn">登录</button>
        <p id="loginError" class="login-error"></p>
        <p class="login-hint" data-auth="testHint">测试账号：1　密码：1</p>
        <div class="login-footer">
          <a id="registerLink" data-auth="create">注册</a>
          <a id="forgotLink" data-auth="forgot">忘记密码</a>
        </div>
      </section>
    </main>
  </div>

  <div id="registerModal" class="modal-overlay hidden">
    <div class="modal-box auth-modal">
      <div class="auth-lang-bar auth-lang-bar-modal">
        <button type="button" class="auth-lang-btn active" data-lang="zh">中文</button>
        <button type="button" class="auth-lang-btn" data-lang="en">EN</button>
        <button type="button" class="auth-lang-btn" data-lang="vi">VI</button>
      </div>
      <p class="modal-kicker" data-auth="join">加入 bbchat</p>
      <h2 class="modal-title" data-auth="createTitle">注册账号</h2>
      <label class="field-label" for="regId" data-auth="account">账号</label>
      <input type="text" id="regId" class="soft-input login-input" data-auth-ph="regIdPh" placeholder="字母开头，3-20位英文/数字" autocomplete="username">
      <label class="field-label" for="regNickname" data-auth="nickname">昵称</label>
      <input type="text" id="regNickname" class="soft-input login-input" data-auth-ph="nickPh" placeholder="可选" autocomplete="nickname">
      <label class="field-label" for="regPassword" data-auth="password">密码</label>
      <input type="password" id="regPassword" class="soft-input login-input" data-auth-ph="anyPwd" placeholder="任意密码" autocomplete="new-password">
      <label class="field-label" for="regPassword2" data-auth="confirm">确认密码</label>
      <input type="password" id="regPassword2" class="soft-input login-input" data-auth-ph="repeatPwd" placeholder="再次输入密码" autocomplete="new-password">
      <p id="regError" class="login-error"></p>
      <div class="modal-actions">
        <button type="button" id="regCancel" class="modal-btn modal-btn-secondary pressable" data-auth="cancel">取消</button>
        <button type="button" id="regConfirm" class="modal-btn modal-btn-primary pressable" data-auth="createBtn">完成注册</button>
      </div>
    </div>
  </div>

  <div id="forgotModal" class="modal-overlay hidden">
    <div class="modal-box auth-modal">
      <h2 class="modal-title" data-auth="resetTitle">重置密码</h2>
      <label class="field-label" for="forgotId" data-auth="account">账号</label>
      <input type="text" id="forgotId" class="soft-input login-input" data-auth-ph="accountPh" placeholder="请输入账号">
      <label class="field-label" for="forgotPassword" data-auth="newPwd">新密码</label>
      <input type="password" id="forgotPassword" class="soft-input login-input" data-auth-ph="anyPwd" placeholder="任意密码">
      <label class="field-label" for="forgotPassword2" data-auth="confirm">确认密码</label>
      <input type="password" id="forgotPassword2" class="soft-input login-input" data-auth-ph="repeatPwd" placeholder="再次输入密码">
      <p id="forgotError" class="login-error"></p>
      <div class="modal-actions">
        <button type="button" id="forgotCancel" class="modal-btn modal-btn-secondary pressable" data-auth="cancel">取消</button>
        <button type="button" id="forgotConfirm" class="modal-btn modal-btn-primary pressable" data-auth="update">确认</button>
      </div>
    </div>
  </div>

  <div id="toast" class="auth-toast hidden"></div>

  <script src="js/api.js"></script>
  <script>
    const AUTH_I18N = {
      zh: {
        subtitle: '连接校园，畅聊每一刻', account: '账号', password: '密码', signIn: '登录',
        create: '注册', forgot: '忘记密码', testHint: '测试账号：1　密码：1',
        accountPh: '请输入账号', passwordPh: '请输入密码', join: '加入 bbchat',
        createTitle: '注册账号', nickname: '昵称', confirm: '确认密码', cancel: '取消',
        createBtn: '完成注册', regIdPh: '字母开头，3-20位英文/数字', nickPh: '可选',
        anyPwd: '任意密码', repeatPwd: '再次输入密码', resetTitle: '重置密码',
        newPwd: '新密码', update: '确认', needBoth: '请输入账号和密码',
        signing: '登录中...', netErr: '网络错误，请重试', needReg: '请填写账号和密码',
        idRule: '账号须字母开头，3-20位英文或数字', pwdMismatch: '两次密码不一致',
        created: '注册成功，正在登录…', resetOk: '密码已重置，请登录'
      },
      en: {
        subtitle: 'Campus chat, made simple.', account: 'Account', password: 'Password', signIn: 'Sign in',
        create: 'Register', forgot: 'Forgot password', testHint: 'Test account: 1 / 1',
        accountPh: 'Username', passwordPh: 'Password', join: 'Join bbchat',
        createTitle: 'Create account', nickname: 'Nickname', confirm: 'Confirm', cancel: 'Cancel',
        createBtn: 'Create', regIdPh: 'Letter first, 3–20 chars', nickPh: 'Optional',
        anyPwd: 'Any password', repeatPwd: 'Repeat password', resetTitle: 'Reset password',
        newPwd: 'New password', update: 'Update', needBoth: 'Enter username and password',
        signing: 'Signing in...', netErr: 'Network error', needReg: 'Username and password required',
        idRule: 'Username must start with a letter (3–20)', pwdMismatch: 'Passwords do not match',
        created: 'Registered! Signing you in…', resetOk: 'Password updated'
      },
      vi: {
        subtitle: 'Trò chuyện khuôn viên, thật đơn giản.', account: 'Tài khoản', password: 'Mật khẩu', signIn: 'Đăng nhập',
        create: 'Đăng ký', forgot: 'Quên mật khẩu', testHint: 'Tài khoản test: 1 / 1',
        accountPh: 'Tên đăng nhập', passwordPh: 'Mật khẩu', join: 'Tham gia bbchat',
        createTitle: 'Tạo tài khoản', nickname: 'Biệt danh', confirm: 'Xác nhận', cancel: 'Hủy',
        createBtn: 'Tạo', regIdPh: 'Bắt đầu bằng chữ, 3–20 ký tự', nickPh: 'Tùy chọn',
        anyPwd: 'Mật khẩu bất kỳ', repeatPwd: 'Nhập lại', resetTitle: 'Đặt lại mật khẩu',
        newPwd: 'Mật khẩu mới', update: 'Cập nhật', needBoth: 'Nhập tài khoản và mật khẩu',
        signing: 'Đang đăng nhập...', netErr: 'Lỗi mạng', needReg: 'Cần tài khoản và mật khẩu',
        idRule: 'Tên phải bắt đầu bằng chữ (3–20)', pwdMismatch: 'Mật khẩu không khớp',
        created: 'Đăng ký thành công, đang đăng nhập…', resetOk: 'Đã cập nhật mật khẩu'
      }
    };

    let authLang = localStorage.getItem('bbchat_lang') || 'zh';
    if (!AUTH_I18N[authLang]) authLang = 'zh';

    function tAuth(key) { return (AUTH_I18N[authLang] || AUTH_I18N.zh)[key] || key; }

    function applyAuthI18n() {
      document.querySelectorAll('[data-auth]').forEach(el => {
        el.textContent = tAuth(el.getAttribute('data-auth'));
      });
      document.querySelectorAll('[data-auth-ph]').forEach(el => {
        el.placeholder = tAuth(el.getAttribute('data-auth-ph'));
      });
      document.querySelectorAll('.auth-lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === authLang);
      });
      document.documentElement.lang = authLang === 'zh' ? 'zh-CN' : authLang;
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.remove('hidden');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.classList.add('hidden'), 2200);
    }

    document.querySelectorAll('.auth-lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        authLang = btn.dataset.lang;
        localStorage.setItem('bbchat_lang', authLang);
        applyAuthI18n();
      });
    });
    applyAuthI18n();

    (async () => {
      // 后台确保测试号存在，不阻塞登录页
      ensureDemoAccount().catch(() => {});

      const usernameEl = document.getElementById('username');
      const passwordEl = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');

      async function doLogin() {
        const login = usernameEl.value.trim();
        const pwd = passwordEl.value;
        if (!login || pwd === '') { loginError.textContent = tAuth('needBoth'); return; }
        loginBtn.disabled = true;
        loginBtn.textContent = tAuth('signing');
        try {
          const result = await loginUser(login, pwd);
          if (result.ok) window.location.href = 'app.html';
          else loginError.textContent = result.error || 'Error';
        } catch (e) {
          loginError.textContent = tAuth('netErr');
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = tAuth('signIn');
        }
      }

      loginBtn.addEventListener('click', doLogin);
      passwordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

      const registerModal = document.getElementById('registerModal');
      document.getElementById('registerLink').addEventListener('click', () => {
        registerModal.classList.remove('hidden');
        document.getElementById('regError').textContent = '';
        ['regId','regNickname','regPassword','regPassword2'].forEach(id => document.getElementById(id).value = '');
        applyAuthI18n();
      });
      document.getElementById('regCancel').addEventListener('click', () => registerModal.classList.add('hidden'));

      document.getElementById('regConfirm').addEventListener('click', async () => {
        const id = document.getElementById('regId').value.trim();
        const nickname = document.getElementById('regNickname').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const pwd2 = document.getElementById('regPassword2').value;
        const errEl = document.getElementById('regError');
        const btn = document.getElementById('regConfirm');
        if (!id || pwd === '') { errEl.textContent = tAuth('needReg'); return; }
        if (!/^[a-zA-Z][a-zA-Z0-9]{2,19}$/.test(id)) { errEl.textContent = tAuth('idRule'); return; }
        if (pwd !== pwd2) { errEl.textContent = tAuth('pwdMismatch'); return; }
        btn.disabled = true;
        try {
          const result = await registerUser({ id, password: pwd, nickname: nickname || id });
          if (result.ok) {
            showToast(tAuth('created'));
            // 注册接口已直接写入会话，立刻进应用
            window.location.href = 'app.html';
          } else errEl.textContent = result.error;
        } catch (_) { errEl.textContent = tAuth('netErr'); }
        finally { btn.disabled = false; }
      });

      const forgotModal = document.getElementById('forgotModal');
      document.getElementById('forgotLink').addEventListener('click', () => {
        forgotModal.classList.remove('hidden');
        document.getElementById('forgotError').textContent = '';
        applyAuthI18n();
      });
      document.getElementById('forgotCancel').addEventListener('click', () => forgotModal.classList.add('hidden'));
      document.getElementById('forgotConfirm').addEventListener('click', async () => {
        const id = document.getElementById('forgotId').value.trim();
        const pwd = document.getElementById('forgotPassword').value;
        const pwd2 = document.getElementById('forgotPassword2').value;
        const errEl = document.getElementById('forgotError');
        if (!id || pwd === '') { errEl.textContent = tAuth('needReg'); return; }
        if (pwd !== pwd2) { errEl.textContent = tAuth('pwdMismatch'); return; }
        try {
          const result = await resetPassword(id, pwd);
          if (result.ok) {
            forgotModal.classList.add('hidden');
            usernameEl.value = id;
            loginError.textContent = tAuth('resetOk');
          } else errEl.textContent = result.error;
        } catch (_) { errEl.textContent = tAuth('netErr'); }
      });
    })();
  </script>
</body>
</html>
