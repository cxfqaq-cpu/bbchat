<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>bbchat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
</head>
<body class="auth-body">
  <div class="login-page">
    <div class="login-bg" aria-hidden="true">
      <div class="login-bg-grid"></div>
      <div class="login-bg-orb login-bg-orb-a"></div>
      <div class="login-bg-orb login-bg-orb-b"></div>
    </div>

    <main class="login-shell">
      <section class="login-brand">
        <img src="assets/logo.svg" alt="bbchat" class="login-logo">
        <h1 class="login-title">bbchat</h1>
        <p class="login-subtitle">Campus chat, made simple.</p>
      </section>

      <section class="login-card">
        <label class="field-label" for="username">Account</label>
        <input type="text" id="username" class="soft-input login-input" placeholder="Username" autocomplete="username">
        <label class="field-label" for="password">Password</label>
        <input type="password" id="password" class="soft-input login-input" placeholder="Password" autocomplete="current-password">
        <button type="button" id="loginBtn" class="login-btn pressable">Sign in</button>
        <p id="loginError" class="login-error"></p>
        <div class="login-footer">
          <a id="registerLink">Create account</a>
          <a id="forgotLink">Forgot password</a>
        </div>
      </section>
    </main>
  </div>

  <div id="registerModal" class="modal-overlay hidden">
    <div class="modal-box auth-modal">
      <p class="modal-kicker">Join bbchat</p>
      <h2 class="modal-title">Create account</h2>
      <label class="field-label" for="regId">Username</label>
      <input type="text" id="regId" class="soft-input login-input" placeholder="Letters + numbers, 3–20" autocomplete="username">
      <label class="field-label" for="regNickname">Display name</label>
      <input type="text" id="regNickname" class="soft-input login-input" placeholder="Optional" autocomplete="nickname">
      <label class="field-label" for="regPassword">Password</label>
      <input type="password" id="regPassword" class="soft-input login-input" placeholder="Any password" autocomplete="new-password">
      <label class="field-label" for="regPassword2">Confirm</label>
      <input type="password" id="regPassword2" class="soft-input login-input" placeholder="Repeat password" autocomplete="new-password">
      <p id="regError" class="login-error"></p>
      <div class="modal-actions">
        <button type="button" id="regCancel" class="modal-btn modal-btn-secondary pressable">Cancel</button>
        <button type="button" id="regConfirm" class="modal-btn modal-btn-primary pressable">Create</button>
      </div>
    </div>
  </div>

  <div id="forgotModal" class="modal-overlay hidden">
    <div class="modal-box auth-modal">
      <p class="modal-kicker">Security</p>
      <h2 class="modal-title">Reset password</h2>
      <label class="field-label" for="forgotId">Username</label>
      <input type="text" id="forgotId" class="soft-input login-input" placeholder="Your account">
      <label class="field-label" for="forgotPassword">New password</label>
      <input type="password" id="forgotPassword" class="soft-input login-input" placeholder="New password">
      <label class="field-label" for="forgotPassword2">Confirm</label>
      <input type="password" id="forgotPassword2" class="soft-input login-input" placeholder="Repeat password">
      <p id="forgotError" class="login-error"></p>
      <div class="modal-actions">
        <button type="button" id="forgotCancel" class="modal-btn modal-btn-secondary pressable">Cancel</button>
        <button type="button" id="forgotConfirm" class="modal-btn modal-btn-primary pressable">Update</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    (async () => {
      try { await ensureDemoAccount(); } catch (_) {}

      const usernameEl = document.getElementById('username');
      const passwordEl = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');

      async function doLogin() {
        const login = usernameEl.value.trim();
        const pwd = passwordEl.value;
        if (!login || !pwd) { loginError.textContent = 'Enter username and password'; return; }
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';
        try {
          const result = await loginUser(login, pwd);
          if (result.ok) window.location.href = 'app.html';
          else loginError.textContent = result.error || 'Sign in failed';
        } catch (e) {
          loginError.textContent = 'Network error. Please try again.';
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign in';
        }
      }

      loginBtn.addEventListener('click', doLogin);
      passwordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

      const registerModal = document.getElementById('registerModal');
      document.getElementById('registerLink').addEventListener('click', () => {
        registerModal.classList.remove('hidden');
        document.getElementById('regError').textContent = '';
        document.getElementById('regId').value = '';
        document.getElementById('regNickname').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regPassword2').value = '';
      });
      document.getElementById('regCancel').addEventListener('click', () => registerModal.classList.add('hidden'));

      document.getElementById('regConfirm').addEventListener('click', async () => {
        const id = document.getElementById('regId').value.trim();
        const nickname = document.getElementById('regNickname').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const pwd2 = document.getElementById('regPassword2').value;
        const errEl = document.getElementById('regError');
        if (!id || pwd === '') { errEl.textContent = 'Username and password are required'; return; }
        if (!/^[a-zA-Z][a-zA-Z0-9]{2,19}$/.test(id)) {
          errEl.textContent = 'Username: start with a letter, 3–20 letters/numbers';
          return;
        }
        if (pwd !== pwd2) { errEl.textContent = 'Passwords do not match'; return; }
        try {
          const result = await registerUser({ id, password: pwd, nickname: nickname || id });
          if (result.ok) {
            registerModal.classList.add('hidden');
            usernameEl.value = result.userId || id.toLowerCase();
            passwordEl.value = pwd;
            loginError.textContent = 'Account created. You can sign in now.';
          } else errEl.textContent = result.error;
        } catch (_) { errEl.textContent = 'Network error'; }
      });

      const forgotModal = document.getElementById('forgotModal');
      document.getElementById('forgotLink').addEventListener('click', () => {
        forgotModal.classList.remove('hidden');
        document.getElementById('forgotError').textContent = '';
      });
      document.getElementById('forgotCancel').addEventListener('click', () => forgotModal.classList.add('hidden'));
      document.getElementById('forgotConfirm').addEventListener('click', async () => {
        const id = document.getElementById('forgotId').value.trim();
        const pwd = document.getElementById('forgotPassword').value;
        const pwd2 = document.getElementById('forgotPassword2').value;
        const errEl = document.getElementById('forgotError');
        if (!id || pwd === '') { errEl.textContent = 'Fill in all fields'; return; }
        if (pwd !== pwd2) { errEl.textContent = 'Passwords do not match'; return; }
        try {
          const result = await resetPassword(id, pwd);
          if (result.ok) {
            forgotModal.classList.add('hidden');
            usernameEl.value = id;
            loginError.textContent = 'Password updated. Sign in.';
          } else errEl.textContent = result.error;
        } catch (_) { errEl.textContent = 'Network error'; }
      });
    })();
  </script>
</body>
</html>
